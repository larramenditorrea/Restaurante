<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gure Karta - Larramendi Torrea</title>
    <style>
        /* Estilos Generales - Manteniendo la coherencia estética */
        :root {
            --primary: #c2a05d; /* Dorado elegante */
            --dark: #121212; /* Fondo oscuro */
            --light: #f4f4f4; /* Texto claro */
            --gray: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: rgba(18, 18, 18, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--primary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 1px;
        }

        /* Navegación entre páginas */
        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        .lang-switch {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            margin-left: 1rem;
        }

        .lang-switch:hover {
            background: var(--primary);
            color: var(--dark);
        }

        /* Contenedor de la carta */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 3rem 1.5rem;
            flex: 1;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* Contenedor de la imagen de la carta */
        .menu-image-container {
            background: var(--gray);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 2.5rem;
            transition: 0.3s;
        }

        .menu-image-container:hover {
            border-color: var(--primary);
        }

        .menu-image {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
        }

        /* Botón de descarga */
        .btn-download {
            background-color: var(--primary);
            color: var(--dark);
            padding: 0.8rem 2rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: #e0bb70;
            transform: scale(1.05);
        }

        footer {
            background: #090909;
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid #222;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            nav {
                width: 100%;
                justify-content: center;
            }
            .lang-switch {
                margin-left: 0;
            }
            h1 { font-size: 2rem; }
            .menu-image-container { padding: 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- Cabecera con Menú de Navegación -->
    <header>
        <a href="index.html" class="logo">LARRAMENDI TORREA</a>
        <nav>
            <a href="index.html" id="nav-home">Hasiera</a>
            <a href="carta.html" class="active" id="nav-menu">Karta</a>
            <button class="lang-switch" onclick="toggleLanguage()">ES / EU</button>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="container">
        <h1 id="page-title">Gure Karta Osoa</h1>
        <p class="subtitle" id="page-subtitle">Ezagutu gure sukaldeko proposamen guztiak.</p>

        <!-- Contenedor de la foto de la carta -->
        <div class="menu-image-container">
            <!-- ⚠️ REEMPLAZA EL ENLACE DE ABAJO POR LA FOTO REAL DE TU CARTA -->
            <img src="https://images.unsplash.com/photo-1590846406792-0adc7f938f1d?auto=format&fit=crop&w=800&q=80" alt="Carta Restaurante" class="menu-image" id="menu-pic">
        </div>

        <!-- Botón para descargar o ver en grande -->
        <!-- ⚠️ REEMPLAZA EL href POR EL ARCHIVO DE TU CARTA SI QUIERES QUE LA DESCARGUEN -->
        <a href="https://images.unsplash.com/photo-1590846406792-0adc7f938f1d?auto=format&fit=crop&w=800&q=80" target="_blank" class="btn-download" id="btn-action">Carta Ikusi / Deskargatu</a>
    </main>

    <!-- Pie de página -->
    <footer>
        <p>© 2026 Larramendi Torrea Jatetxea .EUS. Eskubide guztiak erreserbatuta.</p>
    </footer>

    <!-- Script de Idiomas (Euskera / Castellano) -->
    <script>
        let currentLang = 'eu';

        const content = {
            eu: {
                navHome: "Hasiera",
                navMenu: "Karta",
                pageTitle: "Gure Karta Osoa",
                pageSubtitle: "Ezagutu gure sukaldeko proposamen guztiak.",
                btnAction: "Carta Ikusi / Deskargatu"
            },
            es: {
                navHome: "Inicio",
                navMenu: "Carta",
                pageTitle: "Nuestra Carta Completa",
                pageSubtitle: "Descubre todas las propuestas de nuestra cocina.",
                btnAction: "Ver / Descargar Carta"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'eu' ? 'es' : 'eu';
            
            document.getElementById('nav-home').textContent = content[currentLang].navHome;
            document.getElementById('nav-menu').textContent = content[currentLang].navMenu;
            document.getElementById('page-title').textContent = content[currentLang].pageTitle;
            document.getElementById('page-subtitle').textContent = content[currentLang].pageSubtitle;
            document.getElementById('btn-action').textContent = content[currentLang].btnAction;
        }
    </script>
</body>
</html>
